name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache npm (sandbox runner)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-runner-${{ hashFiles('sandbox/runner/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-runner-

      - name: Install sandbox runner dependencies
        run: npm ci --prefix sandbox/runner

      - name: Verify
        run: pnpm verify
