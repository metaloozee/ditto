packages:
  - apps/*
overrides:
  'alchemy>miniflare': 4.20260710.0
packageExtensions:
  # Streamdown 2.5.0 omits the @types/react peer needed by strict pnpm TypeScript workspaces; remove this extension when upstream declares that peer.
  streamdown@2.5.0:
    peerDependencies:
      '@types/react': '*'
allowBuilds:
  '@google/genai': true
  '@mongodb-js/zstd': false
  better-sqlite3: true
  core-js-pure: false
  esbuild: true
  lefthook: true
  lightningcss: true
  msgpackr-extract: true
  msw: true
  node-liblzma: false
  protobufjs: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - '@shadcn/react@0.1.0'
  - shadcn@4.12.0
