pre-commit:
  parallel: false
  jobs:
    - name: biome format
      run: npm run format {staged_files}
      glob: "*.{js,ts,jsx,tsx}"
    - name: biome fix
      run: npm run fix {staged_files}
      glob: "*.{js,ts,jsx,tsx}"
